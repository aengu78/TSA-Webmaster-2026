   <style>

  /* made the cards look pretty*/
    .cards-wrapper {
        display: grid;
        gap: .25rem;
        grid-template-columns: repeat(auto-fill, minmax(325px, 2fr));
        gap: 2vw;
        margin-top: 1rem;
        height: 100%;
        max-width: 80vw;
    
}
.cards-made{
    background-color: white;
    border-radius: 2vh;
    height: 100%;
    flex: 1;
    padding: 1em;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    box-shadow: rgba(8, 4, 29, 0.926) 1px 1px 10px;
    max-height: 30vh;
    overflow-y: scroll;
        scrollbar-width: none;
        -ms-overflow-style: none;
        overflow-wrap: break-word;
        opacity: 1;
        transform: translateY(2em);
        transition: all 1s ease-in-out;
}

@media(prefers-reduced-motion) {
    .cards-made {
        transition: none;
    }
}

.cards-made.show {
    opacity: 1;
    transform: translateY(0);
}

.cards-made::-webkit-scrollbar, .highlight-desc::-webkit-scrollbar-button { display: none; }



#directory-search-div {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.org-names {
    color: rgba(33, 15, 63, 1);
    display: inline-block;
    margin: .5vh 0 2.5vh 1vw;
    font-family: "Josefin Slab", 'Times New Roman', Times, serif;
    font-size: 2rem;
    font-weight: bold;
    
}

.service-details {
        background-color: rgb(223, 228, 233);
        border-radius: 2vh;
        box-sizing: border-box;
        height: auto;
        padding: 1em;
        font-family: Manrope, Roboto, Arial;
    font-size: 1rem;       
}



.body {
        color:rgba(33, 15, 63, 0.629);
        margin-top: 0;
}

.orgs-site-link {
    overflow: auto; 
}
